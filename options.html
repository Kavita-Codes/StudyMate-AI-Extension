<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyMate AI Settings</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for premium typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="options-body">
    <div class="options-container glass-container">
        <header class="options-header">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="logo-icon"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            <div>
                <h1>StudyMate AI</h1>
                <span class="subtitle">Configuration Panel</span>
            </div>
        </header>

        <main class="options-form">
            <!-- API Key -->
            <div class="form-group">
                <label for="api-key">Gemini API Key</label>
                <div class="input-with-icon">
                    <input type="password" id="api-key" placeholder="Enter your Gemini API key...">
                    <button type="button" id="toggle-api-key" class="eye-btn" title="Toggle visibility">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </button>
                </div>
                <p class="help-text">
                    Get a free API Key from the 
                    <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a>.
                </p>
            </div>

            <!-- Model Selection -->
            <div class="form-group">
                <label for="model-select">AI Model</label>
                <select id="model-select" class="glass-select">
                    <option value="gemini-2.5-flash">Gemini 2.5 Flash (Recommended Default)</option>
                    <option value="gemini-2.5-pro">Gemini 2.5 Pro (Powerful, Analytical)</option>
                    <option value="gemini-2.0-flash">Gemini 2.0 Flash (Fast & Capable)</option>
                    <option value="gemini-1.5-flash-8b">Gemini 1.5 Flash 8B (Ultra-Lightweight & Free)</option>
                    <option value="custom">Custom Model...</option>
                </select>
                <p class="help-text">Choose the model that matches your speed and detail requirements.</p>
            </div>

            <!-- Custom Model Input (Hidden by default) -->
            <div id="custom-model-wrapper" class="form-group hidden">
                <label for="custom-model-input">Custom Model Identifier</label>
                <div class="input-with-icon">
                    <input type="text" id="custom-model-input" placeholder="e.g. gemini-1.5-flash-8b">
                </div>
                <p class="help-text">Enter any valid Gemini model ID.</p>
            </div>

            <!-- Preferred Language -->
            <div class="form-group">
                <label for="language-select">Default Translation Language</label>
                <select id="language-select" class="glass-select">
                    <option value="Hindi">Hindi</option>
                    <option value="English">English</option>
                    <option value="French">French</option>
                    <option value="German">German</option>
                    <option value="Japanese">Japanese</option>
                </select>
            </div>

            <!-- Default Summary Length -->
            <div class="form-group">
                <label for="summary-length-select">Default Summary Style</label>
                <select id="summary-length-select" class="glass-select">
                    <option value="summary_short">Short Summary (Concise Paragraph)</option>
                    <option value="summary_bullet">Bullet Summary (Key Bullet Points)</option>
                    <option value="summary_keypoints">Key Points (Core Takeaways)</option>
                    <option value="summary_exam">Exam Notes (Academic Structure)</option>
                    <option value="summary_linkedin">LinkedIn Summary (Social Media Post)</option>
                </select>
            </div>

            <!-- Theme Selection -->
            <div class="form-group">
                <label for="theme-select">Interface Theme</label>
                <select id="theme-select" class="glass-select">
                    <option value="dark">Sleek Dark Mode (Glassmorphism)</option>
                    <option value="light">Frosted Light Mode</option>
                </select>
            </div>

            <!-- Actions -->
            <div class="options-actions">
                <button id="save-button" class="btn primary-gradient-btn">Save Configurations</button>
            </div>
            
            <p id="success-message" class="options-success hidden">Settings saved successfully!</p>
        </main>
    </div>

    <script src="option.js"></script>
</body>
</html>
